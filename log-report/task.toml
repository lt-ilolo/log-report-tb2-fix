schema_version = "1.3"

# Declared artifact matches exactly what the task produces (an array, not a string).
artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."
authors = [{ name = "dynamo" }]
keywords = ["log-parsing", "etl", "json", "text-processing"]

[metadata]
author_name = "dynamo"
author_email = "unknown"
difficulty = "easy"
category = "data_processing_and_etl"
tags = ["text_processing", "log_parsing", "generated_output_artifact"]
expert_time_estimate_min = 18.0
junior_time_estimate_min = 40.0
solution_explanation = "Read the log, count total requests and unique client IPs, find the most frequent request path, and write the three values to /app/report.json."
verification_explanation = "Parse /app/report.json and assert total_requests, unique_ips, and top_path equal the known-correct values for the access log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
# The task needs no internet to be solved or graded (verifier deps are baked into the
# image), but the local Docker runner cannot enforce a no-network policy, so we use the
# provider-supported default. Reproducibility comes from the digest-pinned base image.
network_mode = "public"
build_timeout_sec = 600.0
os = "linux"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
mcp_servers = []
